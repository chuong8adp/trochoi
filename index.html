<!DOCTYPE html>
<html lang="vi">
<head>

    <title>Happy Kids Zone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">

</header>

    <aside class="sidebar">
        <ul>
            <li data-type="all" class="active">Trang chủ</li>
            <li data-type="giaoduc">Trò chơi giáo dục</li>
            <li data-type="toan">Trò chơi toán</li>
            <li data-type="khoahoc">Trò chơi khoa học</li>

    <!-- CONTENT -->
    <main class="content">
        <h2>MỤC TRÒ CHƠI</h2>
        <div id="gameGrid" class="game-grid"></div>

</div>

<!-- FOOTER -->
<footer class="footer">
    <div class="footer-left">
        <h3>NDC</h3>
        <p>Kết nối với chúng tôi</p>
        <div class="social">
            <span>📘</span>
            <span>🎵</span>
            <span>▶️</span>
        </div>
    </div>
    <div class="footer-center">
        <p>Giới thiệu</p>
        <p>Chính sách</p>
        <p>Liên hệ</p>
    </div>

    <div class="footer-right">

    </div>

<script src="script.js"></script>

</html>
